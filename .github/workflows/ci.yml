# Relay API — build, tests, and Prisma migrations against an ephemeral Postgres.
#
# P9-test-001 — Green jobs together cover `npm run verify:pilot` (build + test + web lint + web build)
# plus migrate deploy, M10 token-log scan, and Redis job tests. See docs/pilot-exit-checklist.md
# § "CI vs local verify:pilot".
#
# Hosted / staging DB: use a deploy workflow (or replace the job `env` below) with
#   env:
#     DATABASE_URL: ${{ secrets.DATABASE_URL }}
# Configure `DATABASE_URL` in the repo/environment secret store (never commit credentials).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
          POSTGRES_DB: relay_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U relay -d relay_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Ephemeral CI database (same shape as root `.env.example`). Aligns with docker-compose host port 5433.
      DATABASE_URL: postgresql://relay:relay@127.0.0.1:5433/relay_dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: M10 token log scan (no secrets in console)
        run: node scripts/m10-token-log-scan.mjs

  # BullMQ + ioredis integration (P1-queue-017): TCP probe, repeat scheduler, one-shot job + traceId.
  redis-jobs:
    runs-on: ubuntu-latest
    env:
      SKIP_REDIS_IT: "0"
      REDIS_URL: redis://127.0.0.1:6379
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Job integration tests (Redis)
        run: npm run test:jobs

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Lint
        run: npm run lint --prefix web

      - name: Build
        run: npm run build --prefix web
